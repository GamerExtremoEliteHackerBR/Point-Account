<!-- index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#007aff">
    <meta name="description" content="Sistema completo de ponto eletrônico com relatórios e configurações personalizáveis">
    <title>Conta Ponto - Sistema de Ponto Eletrônico</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/themes.css">
</head>
<body>
    <div class="app-container">
        <div class="app-card">
            <div class="screen-content" id="dynamicScreen"></div>
            <button class="fab-plus" id="fabPlusBtn" aria-label="Registrar novo ponto">+</button>
            <div class="bottom-nav">
                <button class="nav-btn" id="tabRegistros" data-nav="registros">
                    <span class="nav-icon">📋</span>
                    <span class="nav-label">Registros Dia</span>
                </button>
                <button class="nav-btn" id="tabRelatorios" data-nav="relatorios">
                    <span class="nav-icon">📊</span>
                    <span class="nav-label">Relatórios</span>
                </button>
                <button class="nav-btn" id="tabConfiguracoes" data-nav="configuracoes">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-label">Configurações</span>
                </button>
            </div>
            <div class="footer">
                <div class="footer-text">Desenvolvido por Gamer Extremo 🎮</div>
            </div>
        </div>
    </div>

    <script src="js/utils/constants.js"></script>
    <script src="js/utils/formatters.js"></script>
    <script src="js/services/calculos.js"></script>
    <script src="js/services/storage.js"></script>
    <script src="js/services/export.js"></script>
    <script src="js/components/toast.js"></script>
    <script src="js/utils/datePicker.js"></script>
    <script src="js/components/modal.js"></script>
    <script src="js/modules/shared.js"></script>
    <script src="js/modules/registros.js"></script>
    <script src="js/modules/relatorios.js"></script>
    <script src="js/modules/configuracoes.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
